name: NASA APOD to Bluesky

on:
  schedule:
    # Runs at 7:00 AM GMT+6 (which is 1:00 AM UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  post-apod:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Fetch and post NASA APOD to Bluesky
      env:
        BSKY_USERNAME: ${{ secrets.BSKY_USERNAME }}
        BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        NASA_API_KEY: ${{ secrets.NASA_API_KEY || 'DEMO_KEY' }}
      run: |
        python scripts/apod_bluesky.py
